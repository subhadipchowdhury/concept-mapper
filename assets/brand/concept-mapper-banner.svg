<svg width="520" height="72" viewBox="0 0 520 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Concept Mapper banner</title>
  <desc id="desc">Concept Mapper logo with tagline and a connected node icon.</desc>
  <defs>
    <linearGradient id="cmBannerBg" x1="8" y1="8" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F8EF7"/>
